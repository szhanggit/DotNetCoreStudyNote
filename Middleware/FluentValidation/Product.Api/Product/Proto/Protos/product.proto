syntax = "proto3";

option csharp_namespace = "TXC.Proto.Product";

import "common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service Product {
    rpc GetProducts (GetProductsRequest) returns (ProtoBaseResponse);
	rpc UpdateProductStatus (UpdateProductStatusRequest) returns (UpdateProductStatusResponse);
    rpc UpdateProductBrand (UpdateProductBrandRequest) returns (UpdateProductBrandResponse);
    rpc GetProductBrand (GetProductBrandRequest) returns (ProtoBaseResponse);
    rpc UpdateProductMemo (UpdateProductMemoRequest) returns (UpdateProductMemoResponse);

    rpc UpdateProductExternalProperty (UpdateProductExternalPropertyRequest) returns (UpdateProductExternalPropertyResponse);
    rpc GetProductExternalProperty (GetProductExternalPropertyRequest) returns (ProtoBaseResponse);
    rpc UpdateRedeemRestriction (UpdateRedeemRestrictionRequest) returns (UpdateRedeemRestrictionResponse);
    rpc GetProductList (GetProductListRequest) returns (ProtoBaseResponse);
	rpc GetProductById (GetProductByIdRequest) returns (ProtoBaseResponse);
	rpc GetProductByVersionId (GetProductByVersionIdRequest) returns (ProtoBaseResponse);
	rpc GetProductByProductCode (GetProductByProductCodeRequest) returns (ProtoBaseResponse);
	rpc GetProductHistory (GetProductHistoryRequest) returns (ProtoBaseResponse);
    rpc GetRedeemRestriction (GetRedeemRestrictionRequest) returns (ProtoBaseResponse);
	rpc GetProductPriceByProductId (GetProductPriceByProductIdRequest) returns (ProtoBaseResponse);
	rpc UpdateProductPrice (UpdateProductPriceRequest) returns (UpdateProductPriceResponse);

    rpc GetProductCondition (ProductConditionRequest) returns (ProtoBaseResponse);
    rpc UpdateProductCondition (ProductUpdatingConditionRequest) returns (ProductUpdatingConditionResponse);

    rpc UpdateProductAcceptanceLoop (UpdateProductAcceptanceLoopRequest) returns (ProtoBaseResponse);
}
message DecimalValue {

  // The whole units of the amount.
  int64 units = 1;

  // Number of nano (10^-9) units of the amount.
  // The value must be between -999,999,999 and +999,999,999 inclusive.
  // If `units` is positive, `nanos` must be positive or zero.
  // If `units` is zero, `nanos` can be positive, zero, or negative.
  // If `units` is negative, `nanos` must be negative or zero.
  // For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
  sfixed32  nanos = 2;
}   
message GetProductsRequest {
    int32 tenant_id = 1;
    google.protobuf.StringValue tenant_name = 2;
    google.protobuf.StringValue keyword = 3;
    int32 merchant_acquirer_id = 4;
    int32 status = 5;
	int32 rowcount = 6;
	int32 pagenumber = 7;
}

message GetProductsResponse {
	int32 TotalCount = 1;
    repeated GetProductsItem product_list_items = 2;
}

message GetProductsItem {
    int32 tenant_id = 1;
    google.protobuf.StringValue tenant_name = 2;
	int32 product_id = 3;
	string product_code = 4;
	string product_name = 5;
	string merchant_sku = 6;
	int32 multiple_selection_type = 7;
	int32 voucher_type = 8;
	int32 brand_type = 9;
	int32 merchant_acquirer_id = 10;
	google.protobuf.Timestamp created_on = 11;
	int32 status = 12;
}

message UpdateProductStatusRequest {
    int32 tenant_id = 1;
    google.protobuf.StringValue tenant_name = 2;
	google.protobuf.StringValue TX2UserName = 3;
    int32 product_id = 4;    
    int32 status = 5;    
}

message UpdateProductStatusResponse {
    bool Success = 1;
    google.protobuf.StringValue Message = 2;
    int32 data = 3;
}
message GetProductByIdRequest{
    int32 product_id =1;
    int32 tenant_id = 2;
    google.protobuf.StringValue tenant_name = 3;
}
message GetProductByIdResponse{
    repeated ProductBasicInfo product_basic_info = 1;
}


message GetProductByVersionIdRequest{
    int32 product_version_id =1;
    int32 tenant_id = 2;
    google.protobuf.StringValue tenant_name = 3;
}
message GetProductByVersionIdResponse{
    repeated ProductBasicInfo product_basic_info = 1;
}


message GetProductByProductCodeRequest{
    string product_code =1;
    int32 tenant_id = 2;
    google.protobuf.StringValue tenant_name = 3;
}
message GetProductByProductCodeResponse{
    repeated ProductBasicInfo product_basic_info = 1;
}

message ProductBasicInfo{
    int32 product_id = 1;
    int32 program_id = 2;
    int32 product_version_id = 3;
    string product_code =4;
    string external_product_code =5;
    int32 brand_id = 6;
    int32 merchant_sku_id = 7;
    string product_name = 8;
    string description = 9;
    int32 product_type = 10;
    int32 multiple_selection_type = 11;
    int32 redeem_time = 12;
    bool is_dynamic = 13;
    bool is_deferred_child =14;
    bool is_cart_version = 15;
    bool status = 16;
    bool can_issue = 17;
    google.protobuf.Timestamp stop_issue_time = 18;
    string brand_story = 19;
    string note = 20;
    int32 reminder_id = 21;
    int32 voucher_issuer_id =22;
    int32 product_category = 23;
    int32 product_tag = 24;
    int32 product_issuer = 25;
    string memo = 26;
    string operation_note = 27;
    string sales_note = 28;
    string customer_service_note = 29;
    int32 version = 30;
    bool is_current_version = 31;
    string created_by = 32;
    google.protobuf.Timestamp created_on = 33;
    string last_updated_by = 34;
    google.protobuf.Timestamp last_updated_on = 35;
    bool can_extend = 36;
    int32 extension_scheme_id = 37;
    int32 max_extend_times = 38;
    google.protobuf.Timestamp extension_end_date = 39;
    bool same_as_valid_end_date_on_contract = 40;
}


message UpdateProductBrandRequest {
